services:
  api:
    build:
      context: ./ezra.todo.api/api
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Data Source=/data/todos.db
      - Jwt__Secret=SuperSecretKeyForDockerComposeDev32
      - Cors__AllowedOrigin=http://localhost:3000
      - FrontendUrl=http://localhost:3000
    volumes:
      - ./.data:/data

  app:
    build:
      context: ./ezra.todo.app
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8080
    ports:
      - "3000:8080"
    depends_on:
      - api
